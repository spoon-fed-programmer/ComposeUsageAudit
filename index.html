<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compose Component Audit Viewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080b11;
            --panel-bg: rgba(17, 22, 34, 0.65);
            --panel-border: rgba(255, 255, 255, 0.06);
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-glow: rgba(99, 102, 241, 0.25);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --success: #10b981;
            --success-glow: rgba(16, 185, 129, 0.15);
            --warning: #f59e0b;
            --warning-glow: rgba(245, 158, 11, 0.15);
            --danger: #ef4444;
            --card-bg: rgba(30, 41, 59, 0.3);
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font-main: 'Outfit', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(16, 185, 129, 0.03) 0%, transparent 40%);
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--panel-border);
            backdrop-filter: blur(20px);
            background-color: rgba(8, 11, 17, 0.8);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-section h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-section h1 span {
            background-color: rgba(99, 102, 241, 0.15);
            color: var(--accent);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .source-selector {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            padding: 6px 12px;
            border-radius: var(--radius-md);
        }

        .source-selector label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .source-selector select {
            background: rgba(8, 11, 17, 0.8);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            outline: none;
            font-family: var(--font-main);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .source-selector select:hover {
            border-color: var(--accent);
        }

        .source-selector input {
            background: rgba(8, 11, 17, 0.8);
            color: var(--text-primary);
            border: 1px solid var(--panel-border);
            padding: 6px 12px;
            border-radius: var(--radius-sm);
            outline: none;
            font-family: var(--font-main);
            font-size: 14px;
            width: 200px;
            display: none;
        }

        .source-selector button {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: var(--radius-sm);
            font-family: var(--font-main);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .source-selector button:hover {
            background: var(--accent-hover);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        /* Layout Container */
        .container {
            display: flex;
            flex: 1;
            height: calc(100vh - 81px);
        }

        /* Sidebar */
        .sidebar {
            width: 320px;
            border-right: 1px solid var(--panel-border);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background-color: rgba(17, 22, 34, 0.3);
            overflow-y: auto;
        }

        .sidebar h2 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .runs-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .run-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .run-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(17, 22, 34, 0.8);
        }

        .run-card.active {
            border-color: var(--accent);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .run-card.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background-color: var(--accent);
        }

        .run-card .run-date {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .run-card .run-project {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 12px;
        }

        .run-card .run-meta {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-muted);
        }

        .run-card .run-meta span strong {
            color: var(--text-primary);
        }

        /* Main Content Panel */
        .main-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 16px;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            stroke: var(--text-muted);
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 18px;
        }

        /* Dashboard Overview */
        .dashboard-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .dashboard-title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-title-row h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .dashboard-subtitle {
            font-size: 14px;
            color: var(--text-secondary);
        }

        /* Metrics Cards */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .metric-card {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            backdrop-filter: blur(16px);
            position: relative;
        }

        .metric-card .metric-label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .metric-card .metric-value {
            font-size: 32px;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .metric-card .progress-container {
            width: 100%;
            height: 6px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .metric-card .progress-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 1s ease-out;
        }

        /* Tab Switcher */
        .tabs-header {
            display: flex;
            border-bottom: 1px solid var(--panel-border);
            gap: 24px;
            margin-top: 16px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            font-weight: 600;
            padding-bottom: 12px;
            cursor: pointer;
            position: relative;
            font-family: var(--font-main);
            transition: color 0.3s;
        }

        .tab-btn:hover {
            color: var(--text-primary);
        }

        .tab-btn.active {
            color: var(--accent);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Search and Filter Panel */
        .filter-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            background: rgba(17, 22, 34, 0.4);
            border: 1px solid var(--panel-border);
            padding: 16px;
            border-radius: var(--radius-md);
        }

        .search-wrapper {
            position: relative;
            flex: 1;
            max-width: 400px;
        }

        .search-wrapper input {
            width: 100%;
            background: rgba(8, 11, 17, 0.8);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm);
            padding: 10px 16px 10px 40px;
            color: var(--text-primary);
            outline: none;
            font-family: var(--font-main);
            font-size: 14px;
            transition: all 0.3s;
        }

        .search-wrapper input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.15);
        }

        .search-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            fill: var(--text-muted);
        }

        .filter-group {
            display: flex;
            gap: 8px;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: var(--font-main);
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .filter-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
            box-shadow: 0 0 10px var(--accent-glow);
        }

        /* Components Flat Table */
        .table-container {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: rgba(17, 22, 34, 0.8);
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 600;
            padding: 16px 24px;
            border-bottom: 1px solid var(--panel-border);
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--panel-border);
            font-size: 14px;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(255, 255, 255, 0.015);
        }

        .component-link {
            color: var(--text-primary);
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .component-link:hover {
            color: var(--accent);
            text-decoration: underline;
        }

        .file-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--panel-border);
            color: var(--text-secondary);
            font-size: 12px;
            padding: 4px 8px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
        }

        .count-badge {
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 14px;
        }

        .count-badge.unused {
            color: var(--text-muted);
        }

        .count-badge.active {
            color: var(--success);
        }

        .status-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            display: inline-block;
        }

        .status-tag.active {
            background-color: var(--success-glow);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-tag.unused {
            background-color: rgba(100, 116, 139, 0.1);
            color: var(--text-secondary);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        /* File View Tab */
        .file-view-layout {
            display: grid;
            grid-template-columns: 240px 1fr;
            gap: 28px;
            align-items: flex-start;
        }

        .file-list-menu {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(17, 22, 34, 0.4);
            border: 1px solid var(--panel-border);
            padding: 12px;
            border-radius: var(--radius-md);
        }

        .file-menu-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            text-align: left;
            font-family: var(--font-mono);
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-menu-btn:hover {
            background-color: rgba(255, 255, 255, 0.04);
            color: var(--text-primary);
        }

        .file-menu-btn.active {
            background-color: var(--accent);
            color: #fff;
            font-weight: 600;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .file-detail-content {
            background: var(--panel-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            min-height: 400px;
        }

        .file-header {
            border-bottom: 1px solid var(--panel-border);
            padding-bottom: 20px;
        }

        .file-header .file-package {
            font-size: 14px;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            margin-bottom: 4px;
        }

        .file-header .file-title {
            font-size: 24px;
            font-weight: 700;
            font-family: var(--font-mono);
        }

        .file-components-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .comp-card {
            background: var(--card-bg);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: border-color 0.3s;
        }

        .comp-card:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }

        .comp-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .comp-card-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .comp-card-metrics {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .comp-card-metrics strong {
            color: var(--text-primary);
            font-family: var(--font-mono);
        }

        .comp-usages-header {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .usages-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .usage-tag {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--panel-border);
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .usage-tag::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background-color: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
        }

        .no-usages {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            padding: 4px 0;
        }

        /* Spinner */
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-top: 3px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-section" onclick="goHome()" style="cursor: pointer; user-select: none;">
            <h1>Compose Component Audit <span>Viewer</span></h1>
        </div>
        <div class="source-selector">
            <label for="json-source-select">데이터 소스:</label>
            <select id="json-source-select" onchange="handleSourceChange()">
                <option value="reports/latest_reports.json">reports/latest_reports.json</option>
                <option value="custom">직접 입력...</option>
            </select>
            <input type="text" id="json-source-input" placeholder="파일명 입력 (예: reports/custom.json)" onkeypress="handleCustomSourceKey(event)">
            <button id="load-btn" onclick="loadSourceIndex()">로드</button>
        </div>
    </header>

    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <h2>리포트 이력</h2>
            <div id="runs-list" class="runs-list">
                <!-- Run cards will go here -->
                <div class="empty-state">
                    <p style="font-size: 14px;">리포트 정보 로딩 중...</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-panel" id="main-panel">
            <div class="empty-state">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                <p>리포트 이력에서 조회할 데이터를 선택해 주세요.</p>
            </div>
        </div>
    </div>

    <script>
        // Global States
        let reportRuns = [];
        let selectedRun = null;
        let selectedTab = 'overview'; // 'overview' or 'files'
        let currentSearchQuery = '';
        let currentFilterStatus = 'all'; // 'all', 'active', 'unused'
        let selectedFile = null;
        let currentSortCol = 'file'; // 'file', 'name', 'count', 'status'
        let currentSortDir = 'asc'; // 'asc', 'desc'

        function goHome() {
            selectedRun = null;
            renderSidebarRuns();
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = `
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                    <p>리포트 이력에서 조회할 데이터를 선택해 주세요.</p>
                </div>
            `;
        }

        // CSV Parser
        function parseCSV(text) {
            const lines = [];
            let row = [""];
            let inQuotes = false;
            for (let i = 0; i < text.length; i++) {
                const c = text[i];
                const next = text[i+1];
                if (c === '"') {
                    if (inQuotes && next === '"') {
                        row[row.length - 1] += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (c === ',' && !inQuotes) {
                    row.push("");
                } else if ((c === '\r' || c === '\n') && !inQuotes) {
                    if (c === '\r' && next === '\n') {
                        i++;
                    }
                    lines.push(row);
                    row = [""];
                } else {
                    row[row.length - 1] += c;
                }
            }
            if (row.length > 1 || row[0] !== "") {
                lines.push(row);
            }
            return lines.filter(r => r.some(cell => cell.trim() !== ""));
        }

        // On Load Page
        window.addEventListener('DOMContentLoaded', () => {
            loadSourceIndex();
        });

        function handleSourceChange() {
            const select = document.getElementById('json-source-select');
            const input = document.getElementById('json-source-input');
            if (select.value === 'custom') {
                input.style.display = 'block';
                input.focus();
            } else {
                input.style.display = 'none';
                loadSourceIndex();
            }
        }

        function handleCustomSourceKey(e) {
            if (e.key === 'Enter') {
                loadSourceIndex();
            }
        }

        function getFriendlyErrorMessage(err) {
            if (window.location.protocol === 'file:') {
                return `로컬 파일 프로토콜(file://) 환경에서는 브라우저 보안 정책(CORS) 제한으로 인해 데이터 파일을 불러올 수 없습니다.<br><br>
                <strong>해결 방법:</strong><br>
                1. 터미널에서 이 디렉토리 경로로 이동한 뒤 <code>python -m http.server 8000</code>을 실행합니다.<br>
                2. 브라우저에서 <a href="http://localhost:8000" target="_blank" style="color: var(--accent); text-decoration: underline; font-weight: 600;">http://localhost:8000</a> 주소로 접속해 확인합니다.`;
            }
            return err.message;
        }

        // Fetch reports list json
        async function loadSourceIndex() {
            const select = document.getElementById('json-source-select');
            const input = document.getElementById('json-source-input');
            let jsonPath = select.value;
            
            if (jsonPath === 'custom') {
                jsonPath = input.value.trim();
                if (!jsonPath) {
                    alert('불러올 JSON 파일 경로를 입력해주세요.');
                    return;
                }
            }

            const runsListEl = document.getElementById('runs-list');
            runsListEl.innerHTML = '<div class="spinner"></div>';
            
            try {
                // Fetch index json file
                const response = await fetch(jsonPath);
                if (!response.ok) {
                    throw new Error(`파일을 불러오는데 실패했습니다 (HTTP ${response.status})`);
                }
                reportRuns = await response.json();
                
                if (!Array.isArray(reportRuns) || reportRuns.length === 0) {
                    runsListEl.innerHTML = '<div class="empty-state"><p style="font-size: 14px;">조회된 리포트 내역이 없습니다.</p></div>';
                    return;
                }

                renderSidebarRuns();
                
                // Select the first run by default
                selectRun(reportRuns[0].timestamp);
                
            } catch (err) {
                console.error(err);
                const errMsg = getFriendlyErrorMessage(err);
                runsListEl.innerHTML = `
                    <div class="empty-state" style="padding: 20px; text-align: left; width: 100%; display: block;">
                        <p style="font-size: 14px; color: var(--danger); font-weight: 600; margin-bottom: 8px;">로드 에러</p>
                        <p style="font-size: 12px; line-height: 1.5; color: var(--text-secondary);">${errMsg}</p>
                    </div>
                `;
            }
        }

        // Sidebar render
        function renderSidebarRuns() {
            const listEl = document.getElementById('runs-list');
            listEl.innerHTML = '';

            reportRuns.forEach(run => {
                const card = document.createElement('div');
                card.className = `run-card ${selectedRun && selectedRun.timestamp === run.timestamp ? 'active' : ''}`;
                card.onclick = () => selectRun(run.timestamp);
                
                card.innerHTML = `
                    <div class="run-date">${run.date}</div>
                    <div class="run-project">${run.project_name}</div>
                    <div class="run-meta">
                        <span>컴포넌트: <strong>${run.summary.total_components}</strong></span>
                        <span>참조수: <strong>${run.summary.total_references}</strong></span>
                    </div>
                `;
                listEl.appendChild(card);
            });
        }

        // Selected report run
        async function selectRun(timestamp) {
            selectedRun = reportRuns.find(r => r.timestamp === timestamp);
            renderSidebarRuns(); // Refresh active highlights
            
            if (!selectedRun) return;

            // Initialize views
            selectedTab = 'overview';
            selectedFile = null;
            currentSearchQuery = '';
            currentFilterStatus = 'all';

            // Show loading main panel
            const mainPanel = document.getElementById('main-panel');
            mainPanel.innerHTML = '<div class="spinner" style="margin-top: 100px;"></div>';

            try {
                // Fetch summary.csv for flat components list
                const summaryUrl = `reports/${selectedRun.timestamp}/summary.csv`;
                const response = await fetch(summaryUrl);
                if (!response.ok) {
                    throw new Error(`summary.csv 로드에 실패했습니다.`);
                }
                const csvText = await response.text();
                const parsed = parseCSV(csvText);

                // Parse components table from summary.csv
                // Structure: Metric rows, followed by empty row, header row ["File", "Component", "Reference Count"], then data rows
                let componentStartIdx = -1;
                for (let i = 0; i < parsed.length; i++) {
                    if (parsed[i][0] === 'File' && parsed[i][1] === 'Component') {
                        componentStartIdx = i + 1;
                        break;
                    }
                }

                const componentsData = [];
                if (componentStartIdx !== -1) {
                    for (let i = componentStartIdx; i < parsed.length; i++) {
                        const row = parsed[i];
                        if (row.length >= 3) {
                            componentsData.push({
                                file: row[0],
                                name: row[1],
                                count: parseInt(row[2], 10) || 0
                            });
                        }
                    }
                }
                selectedRun.components = componentsData;

                renderDashboard();
            } catch (err) {
                console.error(err);
                const errMsg = getFriendlyErrorMessage(err);
                mainPanel.innerHTML = `
                    <div class="empty-state" style="text-align: left; max-width: 500px; margin: 100px auto 0; display: block;">
                        <p style="font-size: 16px; color: var(--danger); font-weight: 600; margin-bottom: 12px;">리포트 상세 데이터 로드 실패</p>
                        <p style="font-size: 13px; line-height: 1.6; color: var(--text-secondary);">${errMsg}</p>
                    </div>
                `;
            }
        }

        // Render entire dashboard
        function renderDashboard() {
            const mainPanel = document.getElementById('main-panel');
            
            // Build metrics values
            const total = selectedRun.summary.total_components;
            const active = selectedRun.summary.active_components;
            const unused = selectedRun.summary.unused_components;
            const refs = selectedRun.summary.total_references;
            const activeRatio = total > 0 ? Math.round((active / total) * 100) : 0;
            const unusedRatio = total > 0 ? Math.round((unused / total) * 100) : 0;

            mainPanel.innerHTML = `
                <div class="dashboard-header">
                    <div class="dashboard-title-row">
                        <h2>${selectedRun.project_name} 리포트</h2>
                    </div>
                    <div class="dashboard-subtitle">분석 시간: ${selectedRun.date} | 디렉토리: reports/${selectedRun.timestamp}</div>
                </div>

                <!-- Metrics -->
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">전체 컴포넌트</span>
                        <span class="metric-value">${total}</span>
                        <div class="progress-container"><div class="progress-bar" style="background-color: var(--accent); width: 100%;"></div></div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">활성 컴포넌트</span>
                        <span class="metric-value" style="color: var(--success);">${active} <span style="font-size: 16px; font-weight: 500;">(${activeRatio}%)</span></span>
                        <div class="progress-container"><div class="progress-bar" style="background-color: var(--success); width: ${activeRatio}%;"></div></div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">미사용 컴포넌트</span>
                        <span class="metric-value" style="color: var(--text-secondary);">${unused} <span style="font-size: 16px; font-weight: 500;">(${unusedRatio}%)</span></span>
                        <div class="progress-container"><div class="progress-bar" style="background-color: var(--text-muted); width: ${unusedRatio}%;"></div></div>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">총 사용 참조 횟수</span>
                        <span class="metric-value" style="color: var(--warning);">${refs}</span>
                        <div class="progress-container"><div class="progress-bar" style="background-color: var(--warning); width: 100%;"></div></div>
                    </div>
                </div>

                <!-- Tabs -->
                <div class="tabs-header">
                    <button class="tab-btn ${selectedTab === 'overview' ? 'active' : ''}" onclick="switchTab('overview')">전체 컴포넌트 목록</button>
                    <button class="tab-btn ${selectedTab === 'files' ? 'active' : ''}" onclick="switchTab('files')">파일별 세부 사용처</button>
                </div>

                <!-- Tab Contents -->
                <div id="tab-content-container">
                    <!-- Loaded dynamically -->
                </div>
            `;

            renderTabContent();
        }

        function switchTab(tabName) {
            selectedTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            if (tabName === 'overview') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
            renderTabContent();
        }

        function renderTabContent() {
            const container = document.getElementById('tab-content-container');
            if (selectedTab === 'overview') {
                renderOverviewTab(container);
            } else {
                renderFilesTab(container);
            }
        }

        // Tab 1: Flat components list
        function renderOverviewTab(container) {
            container.innerHTML = `
                <div class="tab-content active">
                    <div class="filter-panel">
                        <div class="search-wrapper">
                            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                            <input type="text" id="comp-search" placeholder="컴포넌트 또는 파일명 검색..." oninput="handleSearch(this.value)" value="${currentSearchQuery}">
                        </div>
                        <div class="filter-group">
                            <button class="filter-btn ${currentFilterStatus === 'all' ? 'active' : ''}" onclick="filterComponents('all')">전체</button>
                            <button class="filter-btn ${currentFilterStatus === 'active' ? 'active' : ''}" onclick="filterComponents('active')">활성</button>
                            <button class="filter-btn ${currentFilterStatus === 'unused' ? 'active' : ''}" onclick="filterComponents('unused')">미사용</button>
                        </div>
                    </div>

                    <div class="table-container">
                        <table>
                            <thead>
                                <tr>
                                    <th id="th-file" onclick="changeSort('file')" style="cursor: pointer; user-select: none;">공통 파일</th>
                                    <th id="th-name" onclick="changeSort('name')" style="cursor: pointer; user-select: none;">컴포넌트명</th>
                                    <th id="th-count" onclick="changeSort('count')" style="cursor: pointer; text-align: right; user-select: none;">참조 수</th>
                                    <th id="th-status" onclick="changeSort('status')" style="cursor: pointer; text-align: center; width: 120px; user-select: none;">상태</th>
                                </tr>
                            </thead>
                            <tbody id="components-tbody">
                                <!-- Trs render dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            updateHeaderArrows();
            filterAndRenderTableRows();
        }

        function handleSearch(val) {
            currentSearchQuery = val.toLowerCase().trim();
            filterAndRenderTableRows();
        }

        function filterComponents(status) {
            currentFilterStatus = status;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterAndRenderTableRows();
        }

        function updateHeaderArrows() {
            const fileArrow = currentSortCol === 'file' ? (currentSortDir === 'asc' ? ' ▲' : ' ▼') : '';
            const nameArrow = currentSortCol === 'name' ? (currentSortDir === 'asc' ? ' ▲' : ' ▼') : '';
            const countArrow = currentSortCol === 'count' ? (currentSortDir === 'asc' ? ' ▲' : ' ▼') : '';
            const statusArrow = currentSortCol === 'status' ? (currentSortDir === 'asc' ? ' ▲' : ' ▼') : '';

            const thFile = document.getElementById('th-file');
            const thName = document.getElementById('th-name');
            const thCount = document.getElementById('th-count');
            const thStatus = document.getElementById('th-status');

            if (thFile) thFile.innerHTML = '공통 파일' + fileArrow;
            if (thName) thName.innerHTML = '컴포넌트명' + nameArrow;
            if (thCount) thCount.innerHTML = '참조 수' + countArrow;
            if (thStatus) thStatus.innerHTML = '상태' + statusArrow;
        }

        function changeSort(col) {
            if (currentSortCol === col) {
                currentSortDir = currentSortDir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSortCol = col;
                currentSortDir = 'asc';
            }
            updateHeaderArrows();
            filterAndRenderTableRows();
        }

        function filterAndRenderTableRows() {
            const tbody = document.getElementById('components-tbody');
            if (!tbody) return;

            let filtered = selectedRun.components || [];

            // Apply search filter
            if (currentSearchQuery) {
                filtered = filtered.filter(c => 
                    c.name.toLowerCase().includes(currentSearchQuery) || 
                    c.file.toLowerCase().includes(currentSearchQuery)
                );
            }

            // Apply status filter
            if (currentFilterStatus === 'active') {
                filtered = filtered.filter(c => c.count > 0);
            } else if (currentFilterStatus === 'unused') {
                filtered = filtered.filter(c => c.count === 0);
            }

            // Apply sorting
            filtered.sort((a, b) => {
                let valA, valB;
                if (currentSortCol === 'file') {
                    valA = a.file.toLowerCase();
                    valB = b.file.toLowerCase();
                } else if (currentSortCol === 'name') {
                    valA = a.name.toLowerCase();
                    valB = b.name.toLowerCase();
                } else if (currentSortCol === 'count') {
                    valA = a.count;
                    valB = b.count;
                } else if (currentSortCol === 'status') {
                    valA = a.count > 0 ? 1 : 0;
                    valB = b.count > 0 ? 1 : 0;
                }

                if (valA < valB) return currentSortDir === 'asc' ? -1 : 1;
                if (valA > valB) return currentSortDir === 'asc' ? 1 : -1;

                // Secondary sorting by name ascending if primary matches
                if (currentSortCol !== 'name') {
                    const nameA = a.name.toLowerCase();
                    const nameB = b.name.toLowerCase();
                    if (nameA < nameB) return -1;
                    if (nameA > nameB) return 1;
                }
                return 0;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="4" style="text-align: center; color: var(--text-muted); padding: 30px;">
                            조건에 맞는 컴포넌트가 없습니다.
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = '';
            filtered.forEach(c => {
                const tr = document.createElement('tr');
                const isUnused = c.count === 0;
                
                tr.innerHTML = `
                    <td><span class="file-badge">${c.file}</span></td>
                    <td><span class="component-link" onclick="navigateToComponentFile('${c.file}')">${c.name}</span></td>
                    <td style="text-align: right;"><span class="count-badge ${isUnused ? 'unused' : 'active'}">${c.count}</span></td>
                    <td style="text-align: center;">
                        <span class="status-tag ${isUnused ? 'unused' : 'active'}">
                            ${isUnused ? 'unused' : 'active'}
                        </span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function navigateToComponentFile(fileName) {
            selectedFile = fileName;
            switchTab('files');
        }

        // Tab 2: File detail view
        function renderFilesTab(container) {
            const filesList = selectedRun.files || [];
            if (filesList.length === 0) {
                container.innerHTML = '<div class="empty-state"><p>조회 가능한 세부 파일 정보가 없습니다.</p></div>';
                return;
            }

            if (!selectedFile) {
                selectedFile = filesList[0];
            }

            container.innerHTML = `
                <div class="tab-content active">
                    <div class="file-view-layout">
                        <!-- Left file menu -->
                        <div class="file-list-menu">
                            <div style="font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--text-muted); padding: 4px 10px 10px;">컴포넌트 소스 파일</div>
                            ${filesList.map(file => `
                                <button class="file-menu-btn ${selectedFile === file ? 'active' : ''}" onclick="selectComponentFile('${file}')">
                                    <span>${file}</span>
                                </button>
                            `).join('')}
                        </div>

                        <!-- Right file detail contents -->
                        <div class="file-detail-content" id="file-detail-panel">
                            <!-- Loaded dynamically via fetch -->
                            <div class="spinner"></div>
                        </div>
                    </div>
                </div>
            `;

            loadSelectedFileDetail();
        }

        function selectComponentFile(file) {
            selectedFile = file;
            document.querySelectorAll('.file-menu-btn').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            const detailPanel = document.getElementById('file-detail-panel');
            detailPanel.innerHTML = '<div class="spinner"></div>';
            
            loadSelectedFileDetail();
        }

        async function loadSelectedFileDetail() {
            const detailPanel = document.getElementById('file-detail-panel');
            try {
                // Fetch specific CSV file (e.g. reports/20260627_194839/Buttons.csv)
                const fileUrl = `reports/${selectedRun.timestamp}/${selectedFile}`;
                const response = await fetch(fileUrl);
                if (!response.ok) {
                    throw new Error(`${selectedFile} 상세 데이터를 가져오지 못했습니다.`);
                }
                const csvText = await response.text();
                const parsed = parseCSV(csvText);

                // Parse component file vertical layout
                // Format:
                // Package,com.common.compose.button
                // File,Buttons.kt
                // empty row
                // Component,PrimaryButton
                // Reference Count,8
                // Referenced Class
                // class1
                // class2
                // empty row
                // Component,IconButton...
                let pkgName = "";
                let fileName = "";
                const compsList = [];
                let currentComp = null;
                let parsingUsages = false;

                parsed.forEach(row => {
                    if (row[0] === 'Package') {
                        pkgName = row[1];
                    } else if (row[0] === 'File') {
                        fileName = row[1];
                    } else if (row[0] === 'Component') {
                        if (currentComp) {
                            compsList.push(currentComp);
                        }
                        currentComp = {
                            name: row[1],
                            count: 0,
                            classes: []
                        };
                        parsingUsages = false;
                    } else if (row[0] === 'Reference Count' && currentComp) {
                        currentComp.count = parseInt(row[1], 10) || 0;
                    } else if (row[0] === 'Referenced Class' && currentComp) {
                        parsingUsages = true;
                    } else if (parsingUsages && currentComp) {
                        if (row[0] && row[0].trim() !== "") {
                            currentComp.classes.push(row[0]);
                        }
                    }
                });
                if (currentComp) {
                    compsList.push(currentComp);
                }

                // Render File Info
                detailPanel.innerHTML = `
                    <div class="file-header">
                        <div class="file-package">패키지: ${pkgName || 'N/A'}</div>
                        <div class="file-title">${fileName || selectedFile}</div>
                    </div>
                    <div class="file-components-list">
                        ${compsList.map(comp => {
                            const isUnused = comp.count === 0;
                            return `
                                <div class="comp-card">
                                    <div class="comp-card-header">
                                        <div class="comp-card-title">
                                            @Composable fun <strong>${comp.name}</strong>
                                        </div>
                                        <span class="status-tag ${isUnused ? 'unused' : 'active'}">
                                            ${isUnused ? 'unused' : 'active'}
                                        </span>
                                    </div>
                                    <div class="comp-card-metrics">
                                        참조 횟수: <strong>${comp.count}</strong>회
                                    </div>
                                    <div>
                                        <div class="comp-usages-header">호출 클래스 / 파일 위치</div>
                                        <div class="usages-grid">
                                            ${isUnused ? `
                                                <div class="no-usages">이 공통 컴포넌트는 프로젝트 내에서 호출된 이력이 없습니다.</div>
                                            ` : comp.classes.map(cls => `
                                                <div class="usage-tag">${cls}</div>
                                            `).join('')}
                                        </div>
                                    </div>
                                </div>
                            `;
                        }).join('')}
                    </div>
                `;

            } catch (err) {
                console.error(err);
                const errMsg = getFriendlyErrorMessage(err);
                detailPanel.innerHTML = `
                    <div class="empty-state" style="text-align: left; max-width: 500px; margin: 40px auto 0; display: block;">
                        <p style="font-size: 16px; color: var(--danger); font-weight: 600; margin-bottom: 12px;">파일 정보 로드 실패</p>
                        <p style="font-size: 13px; line-height: 1.6; color: var(--text-secondary);">${errMsg}</p>
                    </div>
                `;
            }
        }
    </script>
</body>
</html>
